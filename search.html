<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search | DISNEY+ HOTSTAR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="left-nav">
            <div class="logo">DISNEY+ HOTSTAR</div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="#">TV</a>
                <a href="#">Movies</a>
                <a href="#">Sports</a>
            </div>
        </div>
        <div class="user-actions">
            <form action="search.html" method="GET" class="search-box">
                <input type="text" name="q" class="search-input" placeholder="Search Movies, Shows...">
                <button type="submit" class="nav-btn">Search</button>
            </form>
            <a href="profile.html" class="nav-btn profile-link">Profile</a>
        </div>
    </nav>

    <section class="content">
        <h1>Search</h1>
        <div class="previous-search">
            <div class="previous-search-card">
                <img src="got.jpg" alt="Game of Thrones">
                <div class="previous-search-text">
                    <span>Previous search</span>
                    <h2>Game of Thrones</h2>
                </div>
            </div>
        </div>
        <h2>Suggested Results</h2>
        <div class="results-grid">
            <div class="result-card">
                <img src="loki.jpg" alt="Result 1">
                <div class="result-info">
                    <h4>Loki: Season 2</h4>
                    <p>Action · Adventure</p>
                </div>
            </div>
            <div class="result-card">
                <img src="star.jpg" alt="Result 2">
                <div class="result-info">
                    <h4>Star Wars: Ahsoka</h4>
                    <p>Sci-Fi · Drama</p>
                </div>
            </div>
            <div class="result-card">
                <img src="forzen.jpg" alt="Result 3">
                <div class="result-info">
                    <h4>Frozen II</h4>
                    <p>Family · Fantasy</p>
                </div>
            </div>
            <div class="result-card">
                <img src="national.jpg" alt="Result 4">
                <div class="result-info">
                    <h4>National Treasure</h4>
                    <p>Adventure · Mystery</p>
                </div>
            </div>
            <div class="result-card">
                <img src="ab.jpg" alt="Result 5">
                <div class="result-info">
                    <h4>Cricket Live</h4>
                    <p>Sports · Live</p>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
