<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="profile-page">

<div class="profile-container">

    <div class="profile-banner"></div>

    <div class="profile-card">

        <img src="https://i.pravatar.cc/200?img=12" class="profile-avatar">

        <h1>Lingaraj</h1>

        <p>lingaraj@gmail.com</p>

        <button class="edit-btn">
            Edit Profile
        </button>

    </div>


    <div class="subscription-card">

        <div>
            <h2>Premium Plan</h2>
            <p>Unlimited Movies & TV Shows</p>
        </div>

        <button>
            Active
        </button>

    </div>


    <div class="profile-options">

        <a href="#">
            <div class="option">
                <span>👤</span>
                <h3>Account</h3>
            </div>
        </a>

        <a href="#">
            <div class="option">
                <span>❤️</span>
                <h3>Watchlist</h3>
            </div>
        </a>

        <a href="#">
            <div class="option">
                <span>📺</span>
                <h3>Continue Watching</h3>
            </div>
        </a>

        <a href="#">
            <div class="option">
                <span>⬇️</span>
                <h3>Downloads</h3>
            </div>
        </a>

        <a href="#">
            <div class="option">
                <span>⚙️</span>
                <h3>Settings</h3>
            </div>
        </a>

        <a href="#">
            <div class="option">
                <span>❓</span>
                <h3>Help Center</h3>
            </div>
        </a>

    </div>

    <button class="logout-btn">
        Logout
    </button>

</div>

</body>
</html>
